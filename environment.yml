name: platform_shift
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # ── Core data ───────────────────────────────────────────────────
  - pandas>=2.0.0
  - numpy>=1.24.0
  - scikit-learn>=1.3.0

  # ── Visualization ───────────────────────────────────────────────
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - plotly>=5.15.0

  # ── Notebooks ───────────────────────────────────────────────────
  - jupyterlab>=4.0.0
  - ipykernel>=6.0.0

  # ── pip-only packages ───────────────────────────────────────────
  - pip:
    - requests>=2.31.0
    - pdfplumber>=0.10.0
    - textblob>=0.17.0
    # Japanese NLP — run after environment activation:
    # pip install ginza ja-ginza
    - streamlit==1.56.0
